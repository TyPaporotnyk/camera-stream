services:
  app:
    build: .
    environment:
      CAMERAS_CONFIG: /app/config.yml
      HLS_DIR: /var/lib/camera-stream/hls
      FFMPEG_PATH: ffmpeg
      HLS_SEGMENT_TIME: 2
      HLS_LIST_SIZE: 6
      STREAM_RESTART_DELAY: 5
    volumes:
      - ${CAMERAS_CONFIG_FILE:-./config.yml}:/app/config.yml:ro
      - hls:/var/lib/camera-stream/hls
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hls:/var/lib/camera-stream/hls:ro
    restart: unless-stopped

volumes:
  hls:
