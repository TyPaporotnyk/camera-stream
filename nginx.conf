upstream camera_stream_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    location /player/ {
        proxy_pass http://camera_stream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /streams/ {
        alias /var/lib/camera-stream/hls/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache" always;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/local/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /player/ {
        proxy_pass http://camera_stream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /streams/ {
        alias /var/lib/camera-stream/hls/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache" always;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
}
